<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuelgo - Localisation Carburant Kinshasa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Inter pour le style Apple/Premium) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Icônes premium et épurées) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Leaflet CSS (Pour la carte) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: {
                            gray: '#F5F5F7',
                            dark: '#1D1D1F',
                            blue: '#0071E3',
                            green: '#34C759',
                            red: '#FF3B30',
                            orange: '#FF9500'
                        }
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.12)',
                        'float': '0 20px 40px rgba(0,0,0,0.08)'
                    }
                }
            }
        }
    </script>

</head>
<body class="text-apple-dark antialiased">

    <!-- ÉCRAN D'AUTHENTIFICATION -->
    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col bg-white">
        <!-- Image de fond Kinshasa floutée / premium -->
        <div class="absolute inset-0 z-0 bg-cover bg-center opacity-30" style="background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); filter: blur(8px);"></div>
        <div class="absolute inset-0 z-0 bg-gradient-to-b from-white/80 to-apple-gray"></div>
        
        <div class="relative z-10 flex flex-col h-full px-6 md:px-8 py-8 md:py-12 justify-between max-w-md md:max-w-lg lg:max-w-xl mx-auto w-full">
            <div class="fade-in mt-8 md:mt-12 text-center">
                <div class="w-16 h-16 md:w-20 md:h-20 bg-apple-dark rounded-3xl mx-auto flex items-center justify-center shadow-premium mb-4 md:mb-6">
                    <i class="ph ph-gas-pump text-3xl md:text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold tracking-tight mb-2">Fuelgo</h1>
                <p class="text-gray-500 font-medium text-sm md:text-base">Carburant en temps réel à Kinshasa.</p>
            </div>

            <div class="fade-in bg-white/60 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] shadow-premium mb-8 md:mb-12">
                <h2 class="text-lg md:text-xl font-semibold mb-6 text-center">Connexion</h2>
                
                <button onclick="login()" class="w-full bg-white border border-gray-200 hover:bg-gray-50 text-apple-dark font-semibold py-3.5 md:py-4 px-4 md:px-6 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-sm text-sm md:text-base">
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continuer avec Google
                </button>
                <p class="text-xs text-center text-gray-400 mt-6">Accès sécurisé pour les conducteurs.</p>
            </div>
        </div>
    </div>

    <!-- ÉCRAN PRINCIPAL DE L'APPLICATION -->
    <div id="app-screen" class="hidden h-screen w-full relative">
        
        <!-- Le conteneur de la carte -->
        <div id="map" class="absolute inset-0 z-0"></div>

        <!-- Header / Barre de recherche (Glassmorphism) -->
        <header class="absolute top-0 left-0 right-0 z-10 p-3 sm:p-4 md:p-6 pointer-events-none">
            <div class="max-w-3xl mx-auto flex gap-3 sm:gap-4 pointer-events-auto">
                <div class="glass flex-1 flex items-center px-3 sm:px-4 py-2.5 sm:py-3 rounded-2xl shadow-premium min-w-0">
                    <i class="ph ph-magnifying-glass text-lg sm:text-xl text-gray-400 mr-2 sm:mr-3 shrink-0"></i>
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Rechercher une station à Kinshasa..." class="bg-transparent border-none outline-none w-full text-apple-dark font-medium placeholder-gray-400 text-sm sm:text-base truncate">
                </div>
                <div class="glass w-10 h-10 sm:w-12 sm:h-12 shrink-0 rounded-2xl flex items-center justify-center shadow-premium cursor-pointer hover:bg-white/90 transition">
                    <i class="ph-fill ph-user text-lg sm:text-xl text-apple-blue"></i>
                </div>
            </div>
            
            <!-- Badges de filtres -->
            <div class="max-w-3xl mx-auto mt-3 sm:mt-4 flex gap-2 overflow-x-auto pb-2 pointer-events-auto no-scrollbar" style="scrollbar-width: none;">
                <button id="btn-filter-essence" onclick="toggleFilter('essence')" class="glass text-apple-dark px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-semibold flex items-center gap-1.5 sm:gap-2 whitespace-nowrap shadow-sm transition-all">
                    <i class="ph-fill ph-gas-pump"></i> Essence
                </button>
                <button id="btn-filter-gazoil" onclick="toggleFilter('gazoil')" class="glass text-apple-dark px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap shadow-sm transition-all hover:bg-white flex items-center gap-1.5 sm:gap-2">
                    <i class="ph-fill ph-drop"></i>
                    Gazoil
                </button>

                <button id="btn-filter-247" onclick="toggleFilter('open247')" class="glass text-apple-dark px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap shadow-sm transition-all hover:bg-white flex items-center gap-1.5 sm:gap-2">
                    <i class="ph-fill ph-clock-clockwise"></i>
                    Ouvert 24/7
                </button>
            </div>
        </header>

        <!-- Bouton flottant : Trouver la plus proche (Optimisé en position fixed pour écrans longs) -->
        <button onclick="findNearestStation()" id="btn-nearest" class="fixed bottom-8 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-8 md:bottom-10 z-20 bg-apple-dark text-white px-5 sm:px-6 py-3.5 sm:py-4 rounded-full font-semibold shadow-float flex items-center gap-2 sm:gap-3 hover:scale-105 transition-transform whitespace-nowrap text-sm sm:text-base">
            <i class="ph-fill ph-navigation-arrow text-lg sm:text-xl"></i>
            Station la plus proche
        </button>

        <!-- Panneau de détails de la station (Optimisé en position fixed et scrollable) -->
        <div id="station-panel" class="fixed bottom-0 left-0 right-0 md:bottom-8 md:left-8 md:right-auto md:w-[400px] z-30 slide-up slide-up-hidden">
            <div class="bg-white rounded-t-3xl md:rounded-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] p-5 md:p-8 max-h-[70vh] md:max-h-[80vh] overflow-y-auto premium-scroll">
                
                <!-- Poignée pour mobile -->
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-5 md:hidden shrink-0"></div>

                <div class="flex justify-between items-start mb-4">
                    <div class="min-w-0 pr-2">
                        <h3 id="panel-name" class="text-xl sm:text-2xl font-bold tracking-tight text-apple-dark truncate">TotalEnergies Gombe</h3>
                        <p id="panel-distance" class="text-gray-500 font-medium mt-1 flex items-center gap-1 text-xs sm:text-sm truncate">
                            <i class="ph ph-map-pin shrink-0"></i> <span class="truncate">1.2 km • Boulevard du 30 Juin</span>
                        </p>
                    </div>
                    <button onclick="closePanel()" class="w-8 h-8 shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 transition">
                        <i class="ph ph-x font-bold"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-5 md:mb-6">
                    <!-- Prix -->
                    <div class="bg-apple-gray p-3 sm:p-4 rounded-2xl">
                        <p class="text-[10px] sm:text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">Essence / L</p>
                        <p id="panel-price" class="text-lg sm:text-xl font-bold text-apple-dark">2 995 FC</p>
                    </div>
                    <!-- Statut -->
                    <div class="bg-apple-gray p-3 sm:p-4 rounded-2xl">
                        <p class="text-[10px] sm:text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">Horaires</p>
                        <p id="panel-hours" class="text-lg sm:text-xl font-bold text-apple-dark">24/7</p>
                    </div>
                    <!-- Autres infos -->
                    <div id="panel-services"></div>
                </div>

                <!-- Disponibilité / Stock -->
                <div class="mb-4 md:mb-5">
                    <div class="flex justify-between text-xs sm:text-sm mb-2">
                        <span class="font-semibold text-gray-700">Disponibilité du Carburant</span>
                        <span id="panel-stock-text" class="font-bold text-apple-green">Élevée</span>
                    </div>
                    <div class="h-2 sm:h-2.5 bg-gray-100 rounded-full overflow-hidden">
                        <div id="panel-stock-bar" class="h-full bg-apple-green rounded-full transition-all duration-1000" style="width: 85%;"></div>
                    </div>
                </div>

                <!-- Affluence -->
                <div class="mb-6 md:mb-8 flex items-center justify-between p-2.5 sm:p-3 border border-gray-100 rounded-xl">
                    <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                        <div id="panel-affluence-icon" class="w-8 h-8 shrink-0 bg-green-100 rounded-full flex items-center justify-center text-apple-green">
                            <i class="ph-fill ph-users"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs sm:text-sm font-semibold text-gray-700 truncate">Affluence actuelle</p>
                            <p id="panel-affluence-text" class="text-[10px] sm:text-xs font-medium text-gray-500 truncate">Fluide (Peu d'attente)</p>
                        </div>
                    </div>
                </div>

                <!-- Bouton Action -->
                <button id="btn-go" class="w-full bg-apple-blue hover:bg-blue-600 text-white font-semibold py-3.5 md:py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition flex justify-center items-center gap-2 text-sm md:text-base">
                    <i class="ph-fill ph-car-profile text-lg md:text-xl"></i>
                    Y aller • <span id="panel-time">4 min</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Popup Premium -->
<div id="premium-popup"
     class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/40 backdrop-blur-sm">

    <div class="bg-white rounded-3xl shadow-2xl w-[92%] max-w-md p-6 relative animate-popup">

        <!-- Croix -->
        <button onclick="closePopup()"
                class="absolute top-4 right-4 w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 transition flex items-center justify-center">

            <i class="ph ph-x text-xl"></i>

        </button>

        <!-- Icône -->
        <div class="w-16 h-16 rounded-full bg-blue-100 mx-auto flex items-center justify-center mb-5">

            <i class="ph-fill ph-map-pin text-3xl text-apple-blue"></i>

        </div>

        <h3 class="text-xl font-bold text-center mb-3">
            Localisation
        </h3>

        <p id="popup-message"
           class="text-center text-gray-600 leading-relaxed">
        </p>

    </div>

</div>

    <!-- Scripts Leaflet & Logique Applicative -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
